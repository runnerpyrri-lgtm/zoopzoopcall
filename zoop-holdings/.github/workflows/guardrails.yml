# 안전 레일 — PR마다 자동 실행. 사람도 AI도 못 우회.
# holdings는 federated 구조라 앱 워크스페이스(apps/zoopzoopcall) 안에서 검사한다.
name: Guardrails

on:
  pull_request:

permissions:
  contents: read

jobs:
  base-path-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: base path "/zoopzoopcall/" 는 바뀌면 안 된다
        run: |
          f="apps/zoopzoopcall/apps/web/vite.config.ts"
          if [ -f "$f" ]; then
            grep -q 'base: *"/zoopzoopcall/"' "$f" \
              || { echo "::error file=$f::base path가 /zoopzoopcall/ 에서 바뀌었다. 배포 URL이 깨진다."; exit 1; }
          fi

  test-build-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/zoopzoopcall
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/zoopzoopcall/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r build

  lockfile-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: lockfile 대량 변경 차단
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --numstat "$base"...HEAD -- '**/pnpm-lock.yaml' | awk '{s+=$1+$2} END{print s+0}')
          echo "lockfile 변경 라인수: $changed"
          if [ "$changed" -gt 200 ]; then
            echo "::error::pnpm-lock.yaml 변경이 200줄을 초과했다. 사람 검토 필요."; exit 1
          fi

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks (키/토큰 노출 차단)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
