# 앱 목록 단일 소스. 3개 앱은 스택·배포가 제각각(federated). 팀·자동화는 이 파일을 보고 앱별로 다르게 동작한다.

apps:
  - id: zoopzoopcall
    name: 줍줍콜
    status: live
    version: 0.1.0
    repo: runnerpyrri-lgtm/zoopzoopcall
    stack: pnpm + Vite + React PWA
    test: "pnpm -r test"
    build: "pnpm -r build"
    deploy: github-pages
    base_path: /zoopzoopcall/      # ★ 변경 금지
    url: https://runnerpyrri-lgtm.github.io/zoopzoopcall/
    marketing_tone: "청약 무순위/줍줍 알림 · 마감 긴급성 + 무료·간편"

  - id: runningcall
    name: 러닝콜 (running-day-score)
    status: live
    version: 0.13.1
    repo: runnerpyrri-lgtm/runningcall
    stack: Next.js 16 + React 19 (pnpm)
    test: "pnpm test"
    build: "pnpm build"
    deploy: vercel
    url: https://runningcall.vercel.app
    marketing_tone: "날씨·대기질로 '지금 나가도 돼?' 야외활동 컨디션(걷기·산책·러닝·등산·자전거)"

  - id: pushrun
    name: PushRun (pushrun-web-demo)
    status: live
    version: 0.6.6
    repo: runnerpyrri-lgtm/pushrun
    stack: static site (빌드 없음)
    test: "none"
    build: "none"
    deploy: github-pages + vercel  # publish_dir=outputs/pushrun-site
    marketing_tone: "러닝 대회 접수 시작 시간 알림 · 놓치지 마세요"

# 앱 추가 시: 위 형식으로 한 블록 + ops/state/<id>.md + ops/changelog/<id>.md 생성.
