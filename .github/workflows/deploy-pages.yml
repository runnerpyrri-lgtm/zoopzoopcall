# main 에 머지되면 자동으로 빌드해 GitHub Pages(gh-pages 브랜치)로 배포한다.
# 지금까지는 수동(pnpm build → gh-pages 로 push)이라 머지해도 사이트에 반영되지 않았다 — 이 워크플로가 그 갭을 메운다.
# base path 는 저장소 이름과 같은 "/homebom/" 을 사용한다.
name: Deploy homebom Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Vite 번들에 포함되는 공개 함수 URL이며 비밀값이 아니다.
      VITE_NOTICES_URL: https://neqjmxaneibobpedgsnl.functions.supabase.co/notices
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 버전은 package.json 의 packageManager(pnpm@9.15.9)를 따른다.
      # (여기에 version: 을 또 지정하면 "Multiple versions of pnpm" 에러로 배포가 실패한다.)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Diff check
        run: git diff --check

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify Android and iOS native exports
        run: pnpm --filter @robom/homebom-mobile check

      - name: Audit production dependencies
        run: pnpm audit:prod

      - name: Unit test
        run: pnpm test

      - name: Family contract
        run: pnpm validate:family

      - name: Build (base "/homebom/" 유지)
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
        run: pnpm -r build

      - name: Install Playwright Chromium
        run: pnpm --filter @zoopzoopcall/web exec playwright install --with-deps chromium

      - name: Browser regression test
        run: pnpm test:e2e

      # Playwright는 고정 fixture URL로 별도 빌드하므로, 배포 직전에 실운영 URL로 다시 빌드한다.
      - name: Rebuild production bundle
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
        run: pnpm build

      - name: 운영 API 번들 검증
        run: |
          grep -R -q 'neqjmxaneibobpedgsnl.functions.supabase.co/notices' apps/web/dist/assets
          if grep -R -q 'homebom.test/notices' apps/web/dist/assets; then exit 1; fi

      - name: base path 유지 검증 (깨졌으면 배포 중단)
        run: grep -q '/homebom/assets/' apps/web/dist/index.html

      - name: 운영 빌드 SHA 노출 검증
        run: grep -q "${GITHUB_SHA}" apps/web/dist/index.html

      - name: 패밀리 공개 자산 검증
        run: pnpm --filter @zoopzoopcall/web validate:family-assets

      - name: 서비스워커 문법 검증
        run: pnpm validate:sw

      - name: 공개 API 계약 검증
        run: node scripts/validate-notices-response.mjs

      - name: Deploy apps/web/dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: apps/web/dist
