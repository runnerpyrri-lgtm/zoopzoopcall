name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: git diff --check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          # deploy-pages.yml 과 동일한 공개 실공고 엔드포인트. 비밀값이 아니며,
          # CI가 프로덕션과 같은 번들 구성을 검증하도록 맞춘다.
          VITE_NOTICES_URL: https://neqjmxaneibobpedgsnl.functions.supabase.co/notices
      - run: pnpm --filter @zoopzoopcall/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: 실운영 API 번들 재생성
        run: pnpm build
        env:
          VITE_NOTICES_URL: https://neqjmxaneibobpedgsnl.functions.supabase.co/notices
          VITE_BUILD_SHA: ${{ github.sha }}
      - name: 운영 API 번들 확인
        run: |
          grep -R -q 'neqjmxaneibobpedgsnl.functions.supabase.co/notices' apps/web/dist/assets
          if grep -R -q 'homebom.test/notices' apps/web/dist/assets; then exit 1; fi
      - name: base path 유지 확인
        run: grep -q '/homebom/assets/' apps/web/dist/index.html
      - name: 서비스워커 문법 확인
        run: pnpm validate:sw
      - name: 공개 API 계약 확인
        run: node scripts/validate-notices-response.mjs
        env:
          VITE_NOTICES_URL: https://neqjmxaneibobpedgsnl.functions.supabase.co/notices
